[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
allow_untyped_globals = True
allow_untyped_defs = True
ignore_missing_imports = True

[mypy-django.*]
ignore_errors = True

[mypy-ninja.*]
ignore_errors = True

[mypy-jose.*]
ignore_errors = True

[mypy-passlib.*]
ignore_errors = True

[mypy-*.models]
ignore_errors = True
